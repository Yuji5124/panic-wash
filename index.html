<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>パニックウォッシュ</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

  <!-- ===== Screen: Lobby ===== -->
  <div id="screen-lobby" class="screen">
    <div class="lobby-inner">
      <h1 class="title-logo">パニックウォッシュ</h1>
      <p class="subtitle">リアルタイム2人対戦</p>

      <button id="btn-create" class="btn btn--primary btn--lg">ルームを作る</button>

      <div class="or-divider"><span>または</span></div>

      <div class="join-row">
        <input id="input-room-id" class="room-input" type="text"
               placeholder="ルームID" maxlength="6"
               autocomplete="off" autocapitalize="characters" spellcheck="false">
        <button id="btn-join" class="btn btn--secondary">参加</button>
      </div>

      <p id="lobby-error" class="error-msg"></p>
    </div>
  </div>

  <!-- ===== Screen: Waiting ===== -->
  <div id="screen-waiting" class="screen">
    <div class="center-inner">
      <p class="screen-label">ルームID</p>
      <div class="room-id-card">
        <span id="display-room-id" class="room-id-text"></span>
        <button id="btn-copy" class="btn btn--copy">コピー</button>
      </div>
      <p class="hint-text">このIDを相手に共有してください</p>
      <div class="spinner"></div>
      <p class="waiting-msg">相手の参加を待っています…</p>
      <button id="btn-leave-waiting" class="btn btn--ghost">退出</button>
    </div>
  </div>

  <!-- ===== Screen: Ready ===== -->
  <div id="screen-ready" class="screen">
    <div class="center-inner">
      <p class="screen-label">ルームID: <span id="ready-room-id" class="room-id-inline"></span></p>
      <h2 class="ready-heading">対戦相手が見つかりました！</h2>
      <div class="badge-row">
        <div class="player-badge" id="badge-self">
          <span class="badge-role" id="badge-self-name"></span>
          <span class="badge-status" id="badge-self-ready">待機中</span>
        </div>
        <div class="badge-vs">VS</div>
        <div class="player-badge" id="badge-opp">
          <span class="badge-role" id="badge-opp-name"></span>
          <span class="badge-status" id="badge-opp-ready">待機中</span>
        </div>
      </div>
      <button id="btn-ready" class="btn btn--primary btn--lg">準備OK！</button>
      <button id="btn-leave-ready" class="btn btn--ghost">退出</button>
    </div>
  </div>

  <!-- ===== Screen: Game ===== -->
  <div id="screen-game" class="screen">
    <!-- Header -->
    <header class="game-header">
      <span class="role-badge" id="role-badge"></span>
      <div class="timer-wrap">
        <span class="timer-label">残り</span>
        <span id="timer" class="timer-value">60</span>
        <span class="timer-label">秒</span>
      </div>
      <span class="dirty-count-label">汚れ: <span id="dirty-self" class="dirty-count">0</span></span>
    </header>

    <!-- Opponent info bar -->
    <div class="opp-bar">
      <span class="opp-name" id="opp-name-label">相手</span>
      <span class="opp-dirty-wrap">汚れ: <span id="dirty-opp" class="dirty-count opp-val">?</span></span>
      <span id="attack-notif" class="attack-notif"></span>
    </div>

    <!-- Grid area -->
    <div class="game-grid-wrap" id="game-grid-wrap">
      <div class="grid" id="grid-self"></div>
    </div>

    <!-- Zenkeshi -->
    <div class="zenkeshi-wrap">
      <button class="zenkeshi-btn" id="zenkeshi-btn" disabled>
        <span class="zenkeshi-text">全消し！</span>
        <span class="zenkeshi-timer" id="zenkeshi-timer-disp"></span>
      </button>
    </div>
  </div>

  <!-- ===== Screen: Result ===== -->
  <div id="screen-result" class="screen">
    <div class="center-inner">
      <div id="result-content" class="result-content"></div>
      <button id="btn-to-lobby" class="btn btn--primary btn--lg">ロビーへ戻る</button>
    </div>
  </div>

</div><!-- #app -->

<!-- Firebase SDK (compat, no build tools needed) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script src="js/firebase-config.js"></script>
<script src="js/app.js"></script>
</body>
</html>
